name: Build Release Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows NSIS
            os: windows-latest
          - name: macOS DMG
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml --features desktop-runtime

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --features desktop-runtime -- -D warnings

      - name: Rust dependency audit
        shell: bash
        run: |
          cargo install cargo-audit --locked
          npm run security:audit:rust

      - name: 100k search performance test
        run: npm run test:performance

      - name: Security audit
        run: npm run security:audit

      - name: Package installers
        run: npm run build

      - name: Generate Node SBOM
        run: npx --no-install cyclonedx-npm --output-file sbom-node.cdx.json

      - name: Generate Rust SBOM
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --manifest-path src-tauri/Cargo.toml --format json --override-filename sbom-rust.cdx

      - name: Generate Windows checksums
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | ForEach-Object { "$(Get-FileHash $_.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash)  $($_.Name)" } | Set-Content installers-windows.sha256

      - name: Generate macOS checksums
        if: runner.os == 'macOS'
        shell: bash
        run: shasum -a 256 src-tauri/target/release/bundle/dmg/*.dmg > installers-macos.sha256

      - name: Upload installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Zen-Canvas-${{ runner.os }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            sbom-node.cdx.json
            src-tauri/sbom-rust.cdx.json
            installers-*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-artifacts

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Zen Canvas ${{ github.ref_name }}
          body: |
            Zen Canvas unsigned public build.

            - Windows: Tauri NSIS installer
            - macOS: Tauri DMG installer
            - Branded Zen Canvas installer assets, app icon, and bilingual release/legal copy
            - Local-first SQLite FTS search, preview execution, and configurable 15/30/60/90-day restore records
            - Security posture: Tauri desktop runtime, strict content security policy, guarded move/rename operations, and npm high audit clean
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.sha256
            release-artifacts/**/*.cdx.json
          fail_on_unmatched_files: true
