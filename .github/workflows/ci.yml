name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck and tests
        run: |
          npm run typecheck
          npm test

      - name: Remediation contract guard
        run: npm run test:remediation

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --features desktop-runtime

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --features desktop-runtime --all-targets -- -D warnings

      - name: macOS path and temp policy regression
        if: runner.os == 'macOS'
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --features desktop-runtime macos_
          cargo test --manifest-path src-tauri/Cargo.toml --features desktop-runtime temp_safety_tests

      - name: 100k search performance test
        if: runner.os == 'Windows'
        run: npm run test:performance

      - name: npm audit
        run: npm run security:audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: RustSec audit
        run: npm run security:audit:rust

      - name: Windows production build and NSIS package
        if: runner.os == 'Windows'
        run: npm run build

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm run security:audit

      - name: RustSec audit
        run: |
          cargo install cargo-audit --locked
          npm run security:audit:rust
