name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Rust and Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> target
          shared-key: zen-canvas-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'rust-toolchain', 'rust-toolchain.toml') }}
          cache-targets: true
          cache-all-crates: true
          cache-on-failure: true
          cache-directories: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup/toolchains
            ~/.rustup/update

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck and tests
        run: |
          npm run typecheck
          npm test

      - name: Remediation contract guard
        run: npm run test:remediation

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --features desktop-runtime

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --features desktop-runtime --all-targets -- -D warnings

      - name: macOS path and temp policy regression
        if: runner.os == 'macOS'
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --features desktop-runtime macos_
          cargo test --manifest-path src-tauri/Cargo.toml --features desktop-runtime temp_safety_tests

      - name: 100k search performance test
        if: runner.os == 'Windows'
        run: npm run test:performance

      - name: Native filesystem hardening smoke
        if: runner.os == 'Windows'
        run: cargo test --manifest-path src-tauri/Cargo.toml --features "desktop-runtime native-qa" --test native_file_hardening_smoke -- --ignored --nocapture --test-threads=1

      - name: Windows production build and NSIS package
        if: runner.os == 'Windows' && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npm run build

  dependency-audit:
    name: Dependency audit
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm run security:audit

      - name: RustSec audit
        run: |
          cargo install cargo-audit --locked
          npm run security:audit:rust
